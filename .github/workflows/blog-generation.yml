name: Blog Generation

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9:00 AM UTC
  workflow_dispatch:       # Manual trigger

jobs:
  generate:
    name: Generate Blog Posts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate blog posts
        run: npx tsx scripts/generate-blog-posts.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push new posts
        run: |
          if git diff --quiet data/blog-posts.json; then
            echo "No new articles generated"
          else
            echo "New articles found, committing..."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/blog-posts.json

            # Get the new posts count
            GIT_DIFF=$(git diff --stat data/blog-posts.json | tail -1)
            git commit -m "chore(blog): add AI-generated articles

            $GIT_DIFF"
            git push
          fi