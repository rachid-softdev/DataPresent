name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint -- --quiet

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm run db:generate

      - name: Run TypeScript Check
        run: pnpm run web:typecheck

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm run db:generate

      - name: Run Unit Tests
        run: pnpm run test:unit -- --reporter=junit --outputFile=test-results-unit.xml
        env:
          NEXTAUTH_SECRET: nextauth-e2e-secret-minimum-length-32-chars!!
          DATABASE_URL: postgresql://datapresent:test@localhost:5432/datapresent_test

      - name: Upload Unit Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-unit
          path: datapresent-web/test-results-unit.xml

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: datapresent
          POSTGRES_PASSWORD: test
          POSTGRES_DB: datapresent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm --filter datapresent-web exec playwright install --with-deps

      - name: Run E2E Tests
        run: pnpm run test
        env:
          CI: true
          DATABASE_URL: postgresql://datapresent:test@localhost:5432/datapresent_test
          REDIS_URL: redis://localhost:6379
          NEXTAUTH_SECRET: nextauth-e2e-secret-minimum-length-32-chars!!
          NEXTAUTH_URL: http://localhost:3000
          CSRF_SECRET: csrf-e2e-secret-minimum-length-32-chars!!!
          JOB_SIGNING_SECRET: job-signing-e2e-secret-minimum-32-chars
          ANTHROPIC_API_KEY: sk-ant-e2e-placeholder-min-8-chars
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          STRIPE_SECRET_KEY: sk_test_placeholder

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: datapresent-web/playwright-report/
          retention-days: 7

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: datapresent
          POSTGRES_PASSWORD: test
          POSTGRES_DB: datapresent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm run db:generate

      - name: Run Integration Tests
        run: pnpm run test:integration
        env:
          DATABASE_URL: postgresql://datapresent:test@localhost:5432/datapresent_test
          REDIS_URL: redis://localhost:6379
          NEXTAUTH_SECRET: nextauth-e2e-secret-minimum-length-32-chars!!
          NEXTAUTH_URL: http://localhost:3000
          CSRF_SECRET: csrf-e2e-secret-minimum-length-32-chars!!!
          JOB_SIGNING_SECRET: job-signing-e2e-secret-minimum-32-chars
          ANTHROPIC_API_KEY: sk-ant-e2e-placeholder-min-8-chars
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          STRIPE_SECRET_KEY: sk_test_placeholder

      - name: Upload Integration Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-integration
          path: datapresent-web/test-results-integration.xml
          retention-days: 7

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm run db:generate

      - name: Run Coverage
        run: pnpm run test:coverage
        env:
          NEXTAUTH_SECRET: nextauth-e2e-secret-minimum-length-32-chars!!
          DATABASE_URL: postgresql://datapresent:test@localhost:5432/datapresent_test

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: datapresent-web/coverage/
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-unit]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm run db:generate

      - name: Build Next.js Application
        run: pnpm run build
        env:
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_BASE_URL: https://datapresent.com
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: https://datapresent.com
          REDIS_URL: ${{ secrets.REDIS_URL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}

  ci-status:
    name: CI Status
    if: always()
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-unit, test-e2e, test-integration, coverage, build]
    steps:
      - name: Check Pipeline Status
        run: |
          echo "## CI Pipeline Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lint | ${{ needs.lint.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| TypeScript Check | ${{ needs.typecheck.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Unit Tests | ${{ needs.test-unit.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| E2E Tests | ${{ needs.test-e2e.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Integration Tests | ${{ needs.test-integration.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Coverage | ${{ needs.coverage.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build | ${{ needs.build.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for result in "${{ needs.lint.result }}" "${{ needs.typecheck.result }}" \
                        "${{ needs.test-unit.result }}" "${{ needs.test-e2e.result }}" \
                        "${{ needs.test-integration.result }}" "${{ needs.coverage.result }}" \
                        "${{ needs.build.result }}"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "**Overall: failure**" >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi
          done
          echo "**Overall: success**" >> "$GITHUB_STEP_SUMMARY"
