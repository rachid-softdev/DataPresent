<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DataPresent</title>
  <link rel="stylesheet" href="popup.css" />
  <style>
    /* ── CSS Variables (light / dark) ── */
    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f7;
      --text: #1d1d1f;
      --text-secondary: #6e6e73;
      --border: #d2d2d7;
      --accent: #0071e3;
      --accent-hover: #0060c0;
      --success: #30d158;
      --error: #ff453a;
      --radius: 10px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1e;
        --bg-secondary: #2c2c2e;
        --text: #f5f5f7;
        --text-secondary: #98989d;
        --border: #38383a;
        --accent: #0a84ff;
        --accent-hover: #409cff;
        --success: #30d158;
        --error: #ff453a;
      }
    }

    /* ── Reset & Base ── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      min-height: 200px;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    .container {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 20px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: 14px;
    }

    .logo-text {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    /* ── Status indicator ── */
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-secondary);
    }

    .status-dot.connected {
      background: var(--success);
    }

    .status-dot.disconnected {
      background: var(--error);
    }

    /* ── Actions ── */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease;
      font-family: var(--font);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: var(--accent);
      color: #ffffff;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-secondary {
      background: var(--bg-secondary);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--border);
    }

    /* ── Footer / link ── */
    .footer {
      display: flex;
      justify-content: center;
      padding-top: 4px;
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    /* ── Feedback text ── */
    .feedback {
      font-size: 12px;
      color: var(--text-secondary);
      text-align: center;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo-area">
        <div class="logo-icon">DP</div>
        <span class="logo-text">DataPresent</span>
      </div>
      <div class="status" id="connection-status">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Checking...</span>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn btn-primary" id="btn-capture">
        <span>⚡</span> Quick Capture
      </button>
      <button class="btn btn-secondary" id="btn-view-reports">
        <span>📊</span> View Reports
      </button>
    </div>

    <!-- Feedback -->
    <div class="feedback" id="feedback"></div>

    <!-- Footer -->
    <div class="footer">
      <a href="#" id="link-open-app">Open DataPresent →</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
